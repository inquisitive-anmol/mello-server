<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mello Partner Program</title>
  <style>
    :root {
      --primary: #FF4B72;
      --bg-color: #121212;
      --surface: #1E1E1E;
      --text: #FFFFFF;
      --text-muted: #A0A0A0;
      --border: #333333;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 500px;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      text-align: center;
    }
    p.subtitle {
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
    }
    input[type="text"], input[type="date"], select, textarea {
      width: 100%;
      background-color: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      background-color: var(--surface);
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .checkbox-item input {
      display: none;
    }
    .checkbox-item.selected {
      background-color: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    button[type="submit"] {
      width: 100%;
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      margin-bottom: 40px;
    }
    button[type="submit"]:disabled {
      background-color: #555;
      cursor: not-allowed;
    }
    .success-message {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .success-message h2 {
      color: var(--primary);
    }
  </style>
</head>
<body>

<div class="container" id="form-container">
  <h1>Become a Partner</h1>
  <p class="subtitle">Fill out this form to apply for the Mello Partner Program. Our admin team will review your application soon!</p>
  
  <form id="partner-form">
    <div class="form-group">
      <label for="realName">Full Name *</label>
      <input type="text" id="realName" required placeholder="Enter your full name">
    </div>

    <div class="form-group">
      <label>Profile Photo *</label>
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <label class="checkbox-item selected" id="tab-url" style="flex: 1; text-align: center;"><input type="radio" name="photoType" value="url" checked> Paste URL</label>
        <label class="checkbox-item" id="tab-upload" style="flex: 1; text-align: center;"><input type="radio" name="photoType" value="upload"> Upload Image</label>
      </div>
      
      <div id="url-input-group">
        <input type="text" id="avatarUrl" required placeholder="https://example.com/photo.jpg">
      </div>
      
      <div id="upload-input-group" style="display: none; flex-direction: column; gap: 10px;">
        <input type="file" id="avatarFile" accept="image/*" style="background: transparent; border: 1px dashed var(--border); padding: 20px; text-align: center; cursor: pointer;">
        <button type="button" id="upload-btn" style="background-color: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold;">Upload Now</button>
        <div id="upload-status" style="font-size: 12px; color: var(--text-muted); text-align: center;"></div>
        <img id="avatar-preview" src="" alt="Avatar Preview" style="display: none; width: 100px; height: 100px; border-radius: 50px; object-fit: cover; margin: 0 auto; border: 2px solid var(--primary);">
        <input type="hidden" id="uploadedAvatarUrl">
      </div>
    </div>
    
    <div class="form-group">
      <label for="gender">Gender *</label>
      <select id="gender" required>
        <option value="" disabled selected>Select gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="dob">Date of Birth *</label>
      <input type="date" id="dob" required>
    </div>

    <div class="form-group">
      <label>Languages *</label>
      <div class="checkbox-group" id="languages">
        <label class="checkbox-item"><input type="checkbox" value="English"> English</label>
        <label class="checkbox-item"><input type="checkbox" value="Hindi"> Hindi</label>
        <label class="checkbox-item"><input type="checkbox" value="Spanish"> Spanish</label>
        <label class="checkbox-item"><input type="checkbox" value="French"> French</label>
        <label class="checkbox-item"><input type="checkbox" value="Arabic"> Arabic</label>
      </div>
    </div>

    <div class="form-group">
      <label for="bio">Bio *</label>
      <textarea id="bio" required placeholder="Tell us about yourself..."></textarea>
    </div>

    <div class="form-group">
      <label>Interests / Vibe Tags (Optional)</label>
      <div class="checkbox-group" id="interests">
        <label class="checkbox-item"><input type="checkbox" value="Travelling"> Travelling</label>
        <label class="checkbox-item"><input type="checkbox" value="Love"> Love</label>
        <label class="checkbox-item"><input type="checkbox" value="Music"> Music</label>
        <label class="checkbox-item"><input type="checkbox" value="Fitness"> Fitness</label>
        <label class="checkbox-item"><input type="checkbox" value="Food"> Food</label>
        <label class="checkbox-item"><input type="checkbox" value="Movies"> Movies</label>
        <label class="checkbox-item"><input type="checkbox" value="Gaming"> Gaming</label>
        <label class="checkbox-item"><input type="checkbox" value="Art"> Art</label>
      </div>
    </div>

    <button type="submit" id="submit-btn">Submit Application</button>
  </form>
</div>

<div class="container success-message" id="success-container">
  <h2>Application Submitted!</h2>
  <p>Thank you for applying to the Mello Partner Program. Your application is now pending review.</p>
  <p>You can close this page and return to the app.</p>
</div>

<script>
  // Handle checkbox UI toggling
  document.querySelectorAll('.checkbox-item').forEach(item => {
    item.addEventListener('change', (e) => {
      // e.target is the <input type="checkbox"> element
      if (e.target.checked) {
        item.classList.add('selected');
      } else {
        item.classList.remove('selected');
      }
    });
  });

  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  // Photo Type Toggle Logic
  const tabUrl = document.getElementById('tab-url');
  const tabUpload = document.getElementById('tab-upload');
  const urlInputGroup = document.getElementById('url-input-group');
  const uploadInputGroup = document.getElementById('upload-input-group');
  let currentPhotoType = 'url';

  function switchPhotoType(type) {
    currentPhotoType = type;
    if (type === 'url') {
      tabUrl.classList.add('selected');
      tabUpload.classList.remove('selected');
      urlInputGroup.style.display = 'block';
      uploadInputGroup.style.display = 'none';
      document.getElementById('avatarUrl').required = true;
    } else {
      tabUpload.classList.add('selected');
      tabUrl.classList.remove('selected');
      urlInputGroup.style.display = 'none';
      uploadInputGroup.style.display = 'flex';
      document.getElementById('avatarUrl').required = false;
    }
  }

  tabUrl.addEventListener('click', (e) => { e.preventDefault(); switchPhotoType('url'); });
  tabUpload.addEventListener('click', (e) => { e.preventDefault(); switchPhotoType('upload'); });

  const fileInput = document.getElementById('avatarFile');
  const previewImg = document.getElementById('avatar-preview');
  const statusDiv = document.getElementById('upload-status');
  const hiddenUrlInput = document.getElementById('uploadedAvatarUrl');

  // Preview Image when selected
  fileInput.addEventListener('change', (e) => {
    if (fileInput.files && fileInput.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        previewImg.src = e.target.result;
        previewImg.style.display = 'block';
      };
      reader.readAsDataURL(fileInput.files[0]);
      statusDiv.innerText = '';
    } else {
      previewImg.style.display = 'none';
      previewImg.src = '';
    }
  });

  async function uploadImage() {
    if (!fileInput.files || fileInput.files.length === 0) {
      statusDiv.innerText = 'Please select a file first.';
      statusDiv.style.color = 'red';
      return false;
    }

    if (!token) {
      statusDiv.innerText = 'Missing auth token. Cannot upload.';
      statusDiv.style.color = 'red';
      return false;
    }

    statusDiv.innerText = 'Uploading...';
    statusDiv.style.color = 'var(--text-muted)';
    
    const file = fileInput.files[0];
    const reader = new FileReader();
    
    return new Promise((resolve) => {
      reader.onload = async function(e) {
        const base64Data = e.target.result;
        try {
          const response = await fetch('/api/v1/users/upload-avatar', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              filename: file.name,
              fileBase64: base64Data
            })
          });
          
          const data = await response.json();
          if (response.ok && data.url) {
            statusDiv.innerText = 'Upload successful!';
            statusDiv.style.color = 'lime';
            hiddenUrlInput.value = data.url;
            resolve(true);
          } else {
            statusDiv.innerText = 'Upload failed: ' + (data.error || 'Unknown error');
            statusDiv.style.color = 'red';
            resolve(false);
          }
        } catch (err) {
          statusDiv.innerText = 'Upload error: ' + err.message;
          statusDiv.style.color = 'red';
          resolve(false);
        }
      };
      
      reader.onerror = function() {
        statusDiv.innerText = 'Failed to read file.';
        statusDiv.style.color = 'red';
        resolve(false);
      };
      
      reader.readAsDataURL(file);
    });
  }

  // Handle explicit Upload button click
  document.getElementById('upload-btn').addEventListener('click', async () => {
    await uploadImage();
  });

  document.getElementById('partner-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    if (!token) {
      alert("Missing authentication token! Please open this page from within the Mello app.");
      return;
    }

    const submitBtn = document.getElementById('submit-btn');
    submitBtn.disabled = true;
    submitBtn.innerText = 'Submitting...';

    // Gather selected checkboxes
    const languages = Array.from(document.querySelectorAll('#languages input:checked')).map(el => el.value);
    const interests = Array.from(document.querySelectorAll('#interests input:checked')).map(el => el.value);

    if (languages.length === 0) {
      alert("Please select at least one language.");
      submitBtn.disabled = false;
      submitBtn.innerText = 'Submit Application';
      return;
    }

    // Determine the avatar URL based on selected tab
    let finalAvatarUrl = document.getElementById('avatarUrl').value;
    if (currentPhotoType === 'upload') {
      finalAvatarUrl = document.getElementById('uploadedAvatarUrl').value;
      if (!finalAvatarUrl) {
        // Automatically upload if they forgot to click the upload button
        if (fileInput.files && fileInput.files.length > 0) {
          const success = await uploadImage();
          if (!success) {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Submit Application';
            return;
          }
          finalAvatarUrl = document.getElementById('uploadedAvatarUrl').value;
        } else {
          alert("Please upload an image first or switch to Paste URL.");
          submitBtn.disabled = false;
          submitBtn.innerText = 'Submit Application';
          return;
        }
      }
    }

    const bioValue = document.getElementById('bio').value;

    const payload = {
      name: document.getElementById('realName').value,
      avatarUrl: finalAvatarUrl,
      gender: document.getElementById('gender').value,
      dob: document.getElementById('dob').value,
      bio: bioValue,
      description: bioValue,
      languages,
      interests
    };

    try {
      const response = await fetch('/api/v1/users/partner/apply', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      
      if (response.ok) {
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('success-container').style.display = 'block';
      } else {
        alert(data.error || 'An error occurred during submission.');
        submitBtn.disabled = false;
        submitBtn.innerText = 'Submit Application';
      }
    } catch (err) {
      alert('Network error. Please try again.');
      submitBtn.disabled = false;
      submitBtn.innerText = 'Submit Application';
    }
  });
</script>

</body>
</html>
