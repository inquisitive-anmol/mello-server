version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mello-server
    restart: always
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Overwrite the addresses from .env to use the internal docker network names
      - REDIS_URL=redis://redis:6379
      - LIVEKIT_URL=ws://livekit:7880
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - /var/www/mello/server/uploads:/app/uploads
    networks:
      - mello_internal
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  redis:
    image: redis/redis-stack-server:latest
    container_name: mello-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - mello_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  livekit:
    image: livekit/livekit-server:latest
    container_name: mello-livekit
    restart: always
    # --config loads livekit.yaml (webhook, rtc port range, logging)
    # --node-ip MUST be the VPS public IP so LiveKit advertises the correct ICE candidate
    command: --config /etc/livekit.yaml --node-ip=${LIVEKIT_NODE_IP}
    ports:
      - "7880:7880"       # WebSocket signaling (HTTP/WS)
      - "7881:7881"       # WebRTC TCP fallback
      - "7882:7882/udp"   # TURN/UDP
      # Reduced UDP media port range — 200 ports is sufficient for a small-scale app
      # (each participant uses ~2-4 ports; 200 ports handles ~50 concurrent participants)
      # Must match rtc.port_range_start / port_range_end in livekit.yaml
      - "50000-50200:50000-50200/udp"
    environment:
      # Key map passed as env var (LiveKit reads LIVEKIT_KEYS automatically)
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      LIVEKIT_REDIS_ADDRESS: "redis:6379"
      # These are also passed individually so livekit.yaml can interpolate ${LIVEKIT_API_KEY}
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
    volumes:
      # Mount our config file (read-only) — this enables webhook delivery
      - ./livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mello_internal

volumes:
  redis_data:

networks:
  mello_internal:
    driver: bridge
