# LiveKit Server Configuration
# This file is mounted into the livekit container at /etc/livekit.yaml
#
# IMPORTANT: This file should NOT contain raw API keys in git.
# Run `docker/generate-livekit-config.sh` before deployment to generate this file
# from `livekit.yaml.template`.
#
# api_key must match one of the keys defined in LIVEKIT_KEYS environment variable.
webhook:
  api_key: ${LIVEKIT_API_KEY}
  urls:
    - https://mello.zenflows.in/api/v1/webhooks/livekit

# --- RTC / Media ---
# UDP port range for WebRTC media. MUST match what is exposed in docker-compose.yml ports.
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50200
  # use_external_ip: true  # uncomment if LIVEKIT_NODE_IP auto-detection fails

# --- Logging ---
logging:
  level: info
  json: true
